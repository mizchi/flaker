name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: MoonBit deps
        run: moon update

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: CLI smoke
        run: node dist/cli/main.js --help >/dev/null

      - name: Test
        run: >
          pnpm exec vitest run
          tests/adapters/playwright.test.ts
          tests/reporting/*.test.ts
          tests/commands/collect.test.ts
          tests/storage/duckdb.test.ts

      - name: Full test with JSON report
        if: always()
        run: pnpm exec vitest run --reporter=json > vitest-report.json || true

      - name: Upload vitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: vitest-report.json
          if-no-files-found: warn
